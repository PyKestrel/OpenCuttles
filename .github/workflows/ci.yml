name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Must satisfy backend/go.mod's `go 1.25.0`. This said 1.23.x, which
          # forced a silent toolchain download on every run.
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Vet backend
        run: cd backend && go vet ./...
      - name: Test backend
        run: cd backend && go test ./...
      - name: Build backend
        run: cd backend && go build ./cmd/opencuttles-api

  runner:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
          cache-dependency-path: runner/go.sum
      - name: Vet runner
        run: cd runner && go vet ./...
      # The runner is the most actively changed component and its tests never
      # ran in CI before.
      - name: Test runner
        run: cd runner && go test ./...
      # The runner ships as a prebuilt binary per OS, so every target must
      # compile — the platform-specific controllers are build-tagged and a break
      # in one is invisible from the others.
      - name: Cross-build runner
        run: |
          cd runner
          for target in windows/amd64 windows/arm64 linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            echo "==> $target"
            GOOS="${target%/*}" GOARCH="${target#*/}" go build ./...
          done

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      - name: Typecheck frontend
        run: cd frontend && npx tsc --noEmit
      - name: Test frontend
        run: cd frontend && npm test -- --run
      - name: Build frontend
        run: cd frontend && npm run build

  agent:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Flue's CLI needs native TypeScript config support (Node >= 22.18).
          node-version: "22"
          cache: npm
          cache-dependency-path: agent/package-lock.json
      - name: Install agent dependencies
        run: cd agent && npm ci
      - name: Typecheck agent
        run: cd agent && npm run typecheck

  vision:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The heavy ML dependencies (torch, transformers) are far too slow to
      # install per run, so this is a syntax and lint gate only — enough to catch
      # the broken-file class of error that would otherwise only surface on the
      # appliance at boot.
      - name: Compile-check vision sources
        run: python -m compileall -q vision
      - name: Lint vision sources
        run: |
          pip install --quiet ruff
          ruff check vision --select E9,F63,F7,F82

  scripts:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check shell script syntax
        run: bash -n scripts/ubuntu/*.sh
      - name: Lint shell scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          # SC1091: sourced files aren't resolvable in isolation.
          shellcheck --severity=error --exclude=SC1091 scripts/ubuntu/*.sh

  package:
    runs-on: ubuntu-24.04
    needs: [backend, runner, frontend, agent, vision, scripts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build package
        run: make package
